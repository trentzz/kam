# kam run configuration — simplex 12bp UMI chemistry
#
# For protocols using a 12bp UMI with no skip/spacer region.
# Only the forward strand is sequenced (simplex). Duplex assembly is not
# applicable; molecules are assembled as simplex-forward.
#
# Suitable for: NEB/IDT-style single-strand UMI ligation protocols,
# KAPA HyperPrep with custom UMI adapters.
#
# Usage:
#   kam run --config examples/simplex-umi-12bp.toml \
#           --r1 sample_R1.fq.gz \
#           --r2 sample_R2.fq.gz \
#           --targets panel.fa \
#           --output-dir results/
#
# CLI flags always override values set here.

[input]
r1      = "sample_R1.fq.gz"
r2      = "sample_R2.fq.gz"
targets = "panel.fa"

[output]
output_dir    = "results/"
output_format = "tsv,vcf"
qc_output     = "results/qc.json"

# ── Chemistry ─────────────────────────────────────────────────────────────────

[chemistry]
# 12bp UMI region at the start of each read.
umi_length = 12

# No spacer/skip region after the UMI.
skip_length = 0

# Simplex protocol — only one strand per molecule.
duplex = false

# For 12bp UMIs one low-quality base is more common by chance.
# Consider lowering to 15 if too many reads are dropped.
min_umi_quality = 20

# ── Assembly ──────────────────────────────────────────────────────────────────

[assembly]
min_family_size = 1

# ── Indexing ──────────────────────────────────────────────────────────────────

[indexing]
kmer_size = 31

# ── Calling ───────────────────────────────────────────────────────────────────

[calling]
min_confidence = 0.99

# Simplex protocols have inherent strand asymmetry. A relaxed threshold
# reduces false strand-bias labels in the absence of paired strands.
strand_bias_threshold = 0.001

min_alt_molecules = 2

# Duplex filter disabled — no duplex molecules in simplex.
min_alt_duplex = 0

sv_min_confidence        = 0.95
sv_min_alt_molecules     = 1
sv_strand_bias_threshold = 1.0

# max_vaf = 0.35
ti_position_tolerance = 0

# ── Logging ───────────────────────────────────────────────────────────────────

[logging]
log_dir = "results/logs/"
