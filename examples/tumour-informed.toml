# kam run configuration — tumour-informed monitoring mode
#
# Uses a VCF of known somatic variants from the matched tumour biopsy to
# restrict PASS calls to expected positions. Near-zero false positives.
#
# This is the headline use case for serial ctDNA monitoring: track a fixed
# set of tumour mutations across multiple plasma time points without re-running
# discovery. Only variants that match the truth VCF within the position
# tolerance are marked PASS; all other calls are emitted with a TumourInformed
# filter tag so they remain visible but do not pollute the signal.
#
# Usage:
#   kam run --config examples/tumour-informed.toml

[input]
r1              = "plasma_R1.fq.gz"
r2              = "plasma_R2.fq.gz"
targets         = "panel.fa"
target_variants = "tumour_mutations.vcf"

[output]
output_dir    = "results/"
output_format = "tsv,vcf"
qc_output     = "results/qc.json"

[chemistry]
umi_length  = 5
skip_length = 2
duplex      = true
min_umi_quality = 20

[assembly]
min_family_size = 1

[indexing]
kmer_size = 31

[calling]
min_confidence        = 0.99
strand_bias_threshold = 0.01
min_alt_molecules     = 2
min_alt_duplex        = 0

# Exclude germline heterozygotes from PASS calls.
max_vaf = 0.35

sv_min_confidence        = 0.95
sv_min_alt_molecules     = 1
sv_strand_bias_threshold = 1.0

# Allow a 1 bp tolerance for indel left-alignment differences.
ti_position_tolerance = 1

[logging]
log_dir = "results/logs/"
