# varforge config: SNV benchmarking at VAF 2.0%
#
# Self-contained synthetic benchmark using a 2000 bp reference. Five SNVs
# spiked in at 2% VAF. Generated FASTQs are gitignored; only this config
# and the truth VCF are committed.
#
# Run:
#   varforge simulate --config docs/benchmarking/snvindel/configs/snv_vaf020.yaml
reference: docs/benchmarking/snvindel/data/ref.fa

output:
  directory: docs/benchmarking/snvindel/results/sim_snv_vaf020
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true

sample:
  name: SNV_VAF020
  read_length: 150
  coverage: 5000.0
  platform: illumina

fragment:
  model: normal
  mean: 167.0
  sd: 30.0

quality:
  mean_quality: 37
  tail_decay: 0.002

tumour:
  purity: 0.04
  ploidy: 2

mutations:
  vcf: docs/benchmarking/snvindel/data/truth_snvs_vaf020.vcf

umi:
  length: 5
  duplex: true
  pcr_cycles: 8
  family_size_mean: 4.0
  family_size_sd: 1.5
  inline: true

chromosomes:
  - chr1

seed: 2020
