# simplex_umi_panel.yaml — Standard simplex UMI targeted panel
#
# Models a typical 500x hybrid-capture panel sequencing run with inline
# 8-mer simplex UMI barcodes. Represents common commercial capture panels
# such as those used in oncology diagnostics.
#
# Key characteristics:
#   - Simplex (single-strand) UMI: error correction on one strand only
#   - 500x raw coverage, yielding ~150-200x consensus coverage
#   - Low-VAF mutations (0.1%) to stress-test sensitivity without duplex
#   - Normal fragment model: not cfDNA, models tissue or fresh-frozen input
#
# Reference: chr22 (~51 Mbp) from GRCh38 for portability.
#
# Run:
#   varforge simulate --config benchmarking/scripts/configs/simplex_umi_panel.yaml

reference: /path/to/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna  # set to your local GRCh38 reference

output:
  directory: benchmarking/synthetic_data/simplex_umi
  fastq: true
  bam: true
  truth_vcf: true
  manifest: true

sample:
  name: SIMPLEX_UMI_PANEL
  read_length: 150
  coverage: 500.0
  platform: illumina

fragment:
  model: normal
  mean: 200.0
  sd: 30.0

quality:
  mean_quality: 37
  tail_decay: 0.002

tumour:
  purity: 0.50
  ploidy: 2

mutations:
  random:
    count: 50
    vaf_min: 0.001
    vaf_max: 0.002
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05

umi:
  length: 8
  duplex: false
  pcr_cycles: 10
  family_size_mean: 3.0
  family_size_sd: 1.5
  inline: true

chromosomes:
  - chr22

seed: 42
threads: 8
