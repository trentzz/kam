# varforge config: inversion with flanking deletions (INVDEL) at VAF 2.0%
#
# Tests detection of a complex rearrangement: the central sequence is inverted
# and 20 bp flanking deletions remove the transition regions. This is a harder
# detection problem than a clean inversion because there is no shared sequence
# between reference and alt at the junction.
#
# Run:
#   varforge simulate --config docs/benchmarking/sv/configs/sim_invdel_vaf020.yaml
reference: docs/benchmarking/sv/data/ref.fa

output:
  directory: docs/benchmarking/sv/results/sim_invdel_vaf020
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true

sample:
  name: INVDEL_VAF020
  read_length: 150
  coverage: 5000.0
  platform: illumina

fragment:
  model: normal
  mean: 167.0
  sd: 30.0

quality:
  mean_quality: 37
  tail_decay: 0.002

tumour:
  purity: 0.04
  ploidy: 2

mutations:
  vcf: docs/benchmarking/sv/data/truth_invdel_vaf020.vcf

umi:
  length: 5
  duplex: true
  pcr_cycles: 8
  family_size_mean: 4.0
  family_size_sd: 1.5
  inline: true

chromosomes:
  - chr1

seed: 3220
