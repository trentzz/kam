# varforge config: insertion benchmarking at VAF 0.5%
#
# Tests detection of a 99 bp de novo insertion at 0.5% VAF. Insertions have no
# reference anchor at the end of the alt allele, which is a different failure
# mode from deletions (where both anchors are in the reference).
#
# Run:
#   varforge simulate --config docs/benchmarking/sv/configs/sim_ins_vaf005.yaml
reference: docs/benchmarking/sv/data/ref.fa

output:
  directory: docs/benchmarking/sv/results/sim_ins_vaf005
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true

sample:
  name: INS_VAF005
  read_length: 150
  coverage: 5000.0
  platform: illumina

fragment:
  model: normal
  mean: 167.0
  sd: 30.0

quality:
  mean_quality: 37
  tail_decay: 0.002

tumour:
  purity: 0.01
  ploidy: 2

mutations:
  vcf: docs/benchmarking/sv/data/truth_ins_vaf005.vcf

umi:
  length: 5
  duplex: true
  pcr_cycles: 8
  family_size_mean: 4.0
  family_size_sd: 1.5
  inline: true

chromosomes:
  - chr1

seed: 3005
