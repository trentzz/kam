# cfdna_simplex_panel.yaml — cfDNA panel with simplex UMI
#
# Models a 500x cell-free DNA targeted panel using simplex (single-strand)
# UMI barcodes. The cfDNA fragment model produces short, nucleosome-phased
# fragments (mean 167 bp) characteristic of plasma-derived cell-free DNA.
#
# This represents an intermediate between no-UMI and duplex-UMI approaches.
# Simplex consensus removes PCR errors but cannot correct sequencing errors
# on both strands independently, limiting achievable sensitivity compared
# to duplex protocols.
#
# Key characteristics:
#   - Simplex UMI: one-strand error correction, inline 8-mer barcode
#   - cfDNA fragment model: short, nucleosome-phased (mean 167 bp)
#   - 500x coverage: standard liquid biopsy panel depth
#   - 0.1% VAF: ctDNA sensitivity target for early detection use cases
#
# Reference: chr22 (~51 Mbp) from GRCh38 for portability.
#
# Run:
#   varforge simulate --config benchmarking/scripts/configs/cfdna_simplex_panel.yaml

reference: /mnt/tzeng-local/tzeng-thesis/data/ref/GCA_000001405.15_GRCh38_no_alt_analysis_set.fna

output:
  directory: benchmarking/synthetic_data/cfdna_simplex
  fastq: true
  bam: true
  truth_vcf: true
  manifest: true

sample:
  name: CFDNA_SIMPLEX_PANEL
  read_length: 150
  coverage: 500.0
  platform: illumina

fragment:
  model: cfda
  mean: 167.0
  sd: 20.0

quality:
  mean_quality: 36
  tail_decay: 0.003

tumour:
  purity: 0.50
  ploidy: 2

mutations:
  random:
    count: 50
    vaf_min: 0.001
    vaf_max: 0.002
    snv_fraction: 0.80
    indel_fraction: 0.15
    mnv_fraction: 0.05

umi:
  length: 8
  duplex: false
  pcr_cycles: 10
  family_size_mean: 3.0
  family_size_sd: 1.5
  inline: true

chromosomes:
  - chr22

seed: 42
threads: 8
