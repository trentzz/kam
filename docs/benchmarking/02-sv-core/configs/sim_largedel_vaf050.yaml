# varforge config: large deletion (600 bp) benchmarking at VAF 5.0%
#
# Tests detection of a 600 bp deletion at 5% VAF. Large deletions stress the
# path-walking stage: the k-mer graph must bridge a 600 bp gap, which requires
# sufficient coverage at both flanking anchor k-mers.
#
# Run:
#   varforge simulate --config docs/benchmarking/sv/configs/sim_largedel_vaf050.yaml
reference: docs/benchmarking/sv/data/ref.fa

output:
  directory: docs/benchmarking/sv/results/sim_largedel_vaf050
  fastq: true
  bam: false
  truth_vcf: true
  manifest: true

sample:
  name: LARGEDEL_VAF050
  read_length: 150
  coverage: 5000.0
  platform: illumina

fragment:
  model: normal
  mean: 167.0
  sd: 30.0

quality:
  mean_quality: 37
  tail_decay: 0.002

tumour:
  purity: 0.10
  ploidy: 2

mutations:
  vcf: docs/benchmarking/sv/data/truth_largedel_vaf050.vcf

umi:
  length: 5
  duplex: true
  pcr_cycles: 8
  family_size_mean: 4.0
  family_size_sd: 1.5
  inline: true

chromosomes:
  - chr1

seed: 3150
