# kam run configuration — Twist UMI duplex chemistry
#
# Designed for the Twist Biosciences duplex UMI panel.
# Read structure: 5bp UMI + 2bp skip + template (both R1 and R2).
#
# Usage:
#   kam run --config examples/twist-umi-duplex.toml \
#           --r1 sample_R1.fq.gz \
#           --r2 sample_R2.fq.gz \
#           --targets panel.fa \
#           --output-dir results/
#
# CLI flags always override values set here.

[input]
r1      = "sample_R1.fq.gz"
r2      = "sample_R2.fq.gz"
targets = "panel.fa"

# Optional: provide SV junction sequences to enable SV detection.
# sv_junctions = "sv_junctions.fa"

# Optional: provide a tumour VCF to enable tumour-informed monitoring.
# target_variants = "tumour_mutations.vcf"

[output]
output_dir    = "results/"
# Output both TSV and VCF for downstream compatibility.
output_format = "tsv,vcf"
qc_output     = "results/qc.json"

# ── Chemistry ─────────────────────────────────────────────────────────────────

[chemistry]
# 5bp random UMI at the start of each read (Twist Biosciences design).
umi_length = 5

# 2bp monotemplate spacer/skip region after the UMI.
skip_length = 2

# Duplex: R1 and R2 are complementary strands of the same molecule.
duplex = true

# Minimum Phred quality for UMI bases. Reads with any UMI base below this
# are dropped before molecule grouping. Set to 0 to disable.
min_umi_quality = 20

# Minimum template length in bases after stripping UMI and skip.
# Comment out to disable.
# min_template_length = 30

# ── Assembly ──────────────────────────────────────────────────────────────────

[assembly]
# Minimum reads per UMI family before consensus building.
# 1 accepts singletons. 2 ensures at least one read per strand.
min_family_size = 1

# ── Indexing ──────────────────────────────────────────────────────────────────

[indexing]
# K-mer size. 31 is recommended for panels with targets ≥ 100 bp and
# sequencing depth ≥ 1 M read pairs.
kmer_size = 31

# ── Calling ───────────────────────────────────────────────────────────────────

[calling]
# Minimum posterior probability for a PASS variant call.
# 0.99 corresponds to a Bayesian false-discovery rate of roughly 1%.
min_confidence = 0.99

# Fisher exact test p-value cutoff for the strand bias filter.
# Calls with significant strand imbalance (p < threshold) are labelled
# StrandBias. 0.01 is appropriate for most ctDNA panel applications.
strand_bias_threshold = 0.01

# Minimum number of alt-supporting molecules to emit a call.
# 2 requires at least two independent molecules to reduce false positives
# from polymerase errors.
min_alt_molecules = 2

# Minimum variant-specific duplex molecules for a PASS call.
# Set to 1 to require duplex confirmation on the alt allele.
# 0 disables the filter (recommended at lower duplex rates, e.g. < 15%).
min_alt_duplex = 0

# Minimum posterior probability for SV-type calls
# (LargeDeletion, TandemDuplication, Inversion).
sv_min_confidence = 0.95

# Minimum alt molecule count for SV-type calls.
sv_min_alt_molecules = 1

# Fisher p-value threshold for strand bias on SV-type calls.
# 1.0 disables the filter — inversion reads are structurally strand-biased
# and cannot pass a standard threshold.
sv_strand_bias_threshold = 1.0

# Maximum VAF for a PASS call. Uncomment to exclude germline heterozygotes.
# max_vaf = 0.35

# Position tolerance (bp) for tumour-informed matching.
# 0 requires exact REF/ALT matching. Use > 0 for large SVs.
ti_position_tolerance = 0

# ── Logging ───────────────────────────────────────────────────────────────────

[logging]
log_dir = "results/logs/"
