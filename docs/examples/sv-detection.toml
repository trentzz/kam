# kam run configuration — SV detection
#
# Detects structural variants (large deletions, tandem duplications, inversions)
# alongside SNVs and indels. Requires a FASTA of SV junction sequences whose
# k-mers are added to the allowlist so that breakpoint-spanning reads are
# captured during indexing.
#
# SV thresholds are intentionally relaxed relative to SNV thresholds:
# breakpoint k-mers are rarer by nature and two supporting molecules
# is strong evidence for a real SV.
#
# Usage:
#   kam run --config examples/sv-detection.toml \
#           --r1 sample_R1.fq.gz \
#           --r2 sample_R2.fq.gz \
#           --targets panel.fa \
#           --output-dir results/
#
# Generate sv_junctions.fa using varforge or a BED of known breakpoints.

[input]
r1           = "sample_R1.fq.gz"
r2           = "sample_R2.fq.gz"
targets      = "panel.fa"
# SV junction sequences — required for SV k-mer capture.
sv_junctions = "sv_junctions.fa"

[output]
output_dir    = "results/"
output_format = "tsv,vcf"
qc_output     = "results/qc.json"

[chemistry]
umi_length      = 5
skip_length     = 2
duplex          = true
min_umi_quality = 20

[assembly]
min_family_size = 1

[indexing]
kmer_size = 31

[calling]
# SNV/indel thresholds.
min_confidence        = 0.99
strand_bias_threshold = 0.01
min_alt_molecules     = 2
min_alt_duplex        = 0

# SV thresholds — relaxed to accommodate the low expected k-mer depth at
# breakpoints.
sv_min_confidence = 0.95
sv_min_alt_molecules = 1
# Inversions produce structurally strand-biased reads; disable the filter.
sv_strand_bias_threshold = 1.0

ti_position_tolerance = 0

[logging]
log_dir = "results/logs/"
