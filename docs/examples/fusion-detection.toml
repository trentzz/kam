# kam run configuration — fusion gene detection
#
# Detects gene fusions using synthetic fusion target sequences. Each fusion
# FASTA entry encodes both partner coordinates in its ID and spans the
# breakpoint. K-mers from fusion sequences are added to the allowlist
# alongside normal target k-mers so that fusion-spanning reads are captured
# during indexing.
#
# Fusion-spanning reads are rare: typically 1–5% of molecules at a locus
# even at high VAF. Thresholds are relaxed accordingly.
#
# Usage:
#   kam run --config examples/fusion-detection.toml \
#           --r1 sample_R1.fq.gz \
#           --r2 sample_R2.fq.gz \
#           --targets panel.fa \
#           --output-dir results/
#
# Generate fusion_targets.fa from a BED of fusion partners using varforge
# or a custom script that produces entries with the required ID format:
#   {name}__{chromA}:{startA}-{endA}__{chromB}:{startB}-{endB}__fusion

[input]
r1             = "sample_R1.fq.gz"
r2             = "sample_R2.fq.gz"
targets        = "panel.fa"
# Synthetic fusion sequences — required for fusion k-mer capture.
fusion_targets = "fusion_targets.fa"

[output]
output_dir    = "results/"
output_format = "tsv,vcf"
qc_output     = "results/qc.json"

[chemistry]
umi_length      = 5
skip_length     = 2
duplex          = true
min_umi_quality = 20

[assembly]
min_family_size = 1

[indexing]
# Larger k-mer reduces false-positive k-mer hits across homologous regions
# near fusion partners.
kmer_size = 35

[calling]
min_confidence        = 0.99
strand_bias_threshold = 0.01
min_alt_molecules     = 2
min_alt_duplex        = 0

# Fusions are detected via the SV calling path; apply relaxed SV thresholds.
sv_min_confidence        = 0.95
sv_min_alt_molecules     = 1
sv_strand_bias_threshold = 1.0

ti_position_tolerance = 0

[logging]
log_dir = "results/logs/"
