# kam run configuration — SV high sensitivity
#
# Very permissive thresholds for detecting SVs at low VAF (0.5–2%).
# Designed for benchmarking varforge SV sweeps or research discovery where
# any evidence of a structural variant should surface.
#
# Expect elevated false positives. All output variants should be manually
# reviewed or filtered with an independent method before reporting.
#
# Usage:
#   kam run --config examples/sv-high-sensitivity.toml \
#           --r1 sample_R1.fq.gz \
#           --r2 sample_R2.fq.gz \
#           --targets panel.fa \
#           --output-dir results/

[input]
r1           = "sample_R1.fq.gz"
r2           = "sample_R2.fq.gz"
targets      = "panel.fa"
sv_junctions = "sv_junctions.fa"

[output]
output_dir    = "results/"
output_format = "tsv,vcf"
qc_output     = "results/qc.json"

[chemistry]
umi_length      = 5
skip_length     = 2
duplex          = true
# Accept UMI bases at Q15 to recover more molecules at low input.
min_umi_quality = 15

[assembly]
min_family_size = 1

[indexing]
kmer_size = 31

[calling]
# Standard SNV thresholds.
min_confidence        = 0.99
strand_bias_threshold = 0.01
min_alt_molecules     = 2
min_alt_duplex        = 0

# SV thresholds — maximally permissive for low-VAF detection.
sv_min_confidence        = 0.70
sv_min_alt_molecules     = 1
sv_strand_bias_threshold = 1.0

ti_position_tolerance = 0

[logging]
log_dir = "results/logs/"
# Enable detailed variant filtering log for post-hoc FP analysis.
log = ["variants_filtered"]
