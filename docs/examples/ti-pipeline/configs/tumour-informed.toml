# kam run configuration — tumour-informed mode
#
# Restricts PASS calls to the known somatic mutations from the matched biopsy.
# All other variants are emitted with a TumourInformed filter tag so they
# remain visible but do not contribute to the signal.
#
# Targets are generated per-mutation from the VCF using multiseqex:
#   multiseqex hg38.fa \
#       --vcf inputs/mutations.vcf \
#       --flank 200 \
#       --name-template "{chr}:{start}-{end}" \
#       -o targets.fa
#
# Paths for r1, r2, targets, and output_dir are passed via CLI and override
# the placeholder values below:
#   kam run --config configs/tumour-informed.toml \
#           --r1 plasma_R1.fq.gz \
#           --r2 plasma_R2.fq.gz \
#           --targets targets.fa \
#           --output-dir results/tumour-informed/

[input]
r1      = "placeholder_R1.fq.gz"
r2      = "placeholder_R2.fq.gz"
targets = "targets.fa"
# Restricts PASS calls to variants matching positions in this VCF.
# Variants not in this file are still emitted but marked TumourInformed.
target_variants = "inputs/mutations.vcf"

[output]
output_dir    = "results/tumour-informed/"
output_format = "tsv,vcf"
qc_output     = "results/tumour-informed/qc.json"

[chemistry]
umi_length      = 5
skip_length     = 2
duplex          = true
min_umi_quality = 20

[assembly]
# Stricter than discovery: require at least 2 reads per molecule for monitoring.
min_family_size = 2

[indexing]
kmer_size = 31

[calling]
min_confidence        = 0.99
strand_bias_threshold = 0.01
min_alt_molecules     = 2
min_alt_duplex        = 0

# Exclude germline heterozygotes from PASS calls.
max_vaf = 0.35

# 1 bp tolerance is required because multiseqex uses 1-based VCF coordinates
# in FASTA headers, but kam treats the header start as 0-based. This produces
# a systematic 1 bp offset in computed variant positions relative to the VCF.
ti_position_tolerance = 1

[logging]
log_dir = "results/tumour-informed/logs/"
