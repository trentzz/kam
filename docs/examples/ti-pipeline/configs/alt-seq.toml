# kam run configuration — alt-seq / SV junction mode
#
# Detects large structural variants (deletions, inversions) using junction
# sequences generated by multiseqex --alt-seq. The junction sequences are
# added to the k-mer allowlist so that breakpoint-spanning reads are captured
# during indexing. Tumour-informed filtering restricts PASS calls to the
# known SV set from the matched biopsy.
#
# Step 1: generate reference windows (used for depth measurement):
#   multiseqex hg38.fa \
#       --vcf inputs/sv_mutations.vcf \
#       --flank 200 \
#       --name-template "{chr}:{start}-{end}" \
#       -o sv_targets.fa
#
# Step 2: generate alt allele junction sequences (headers are ignored by kam):
#   multiseqex hg38.fa \
#       --vcf inputs/sv_mutations.vcf \
#       --alt-seq \
#       --flank 100 \
#       -o sv_junctions.fa
#
# Paths for r1, r2, targets, and output_dir are passed via CLI and override
# the placeholder values below:
#   kam run --config configs/alt-seq.toml \
#           --r1 plasma_R1.fq.gz \
#           --r2 plasma_R2.fq.gz \
#           --targets sv_targets.fa \
#           --output-dir results/alt-seq/

[input]
r1      = "placeholder_R1.fq.gz"
r2      = "placeholder_R2.fq.gz"
targets = "sv_targets.fa"
# Junction sequences from multiseqex --alt-seq. kam adds their k-mers to the
# allowlist so breakpoint-spanning reads are captured. Headers are ignored.
sv_junctions    = "sv_junctions.fa"
# Restricts PASS calls to the SVs in this VCF.
target_variants = "inputs/sv_mutations.vcf"

[output]
output_dir    = "results/alt-seq/"
output_format = "tsv,vcf"
qc_output     = "results/alt-seq/qc.json"

[chemistry]
umi_length      = 5
skip_length     = 2
duplex          = true
min_umi_quality = 20

[assembly]
min_family_size = 1

[indexing]
kmer_size = 31

[calling]
min_confidence        = 0.99
strand_bias_threshold = 0.01
min_alt_molecules     = 2
min_alt_duplex        = 0

# SVs often appear at higher VAF than SNVs in biopsy-confirmed cases.
# Keep max_vaf at 0.35 to exclude germline events.
max_vaf = 0.35

# SV thresholds: relaxed because breakpoint k-mers are rarer by nature.
sv_min_confidence        = 0.90
sv_min_alt_molecules     = 1
# Inversions and InvDels produce structurally strand-biased reads; disable filter.
sv_strand_bias_threshold = 1.0

# SVs need wider position tolerance: partial allele representations and
# breakpoint imprecision can cause offsets larger than 1 bp. Use 10 bp.
ti_position_tolerance = 10

[logging]
log_dir = "results/alt-seq/logs/"
