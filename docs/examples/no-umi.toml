# kam run configuration — no UMI chemistry
#
# For standard (non-UMI) sequencing libraries where no molecular barcode is
# present. UMI-based deduplication and family-size filtering are disabled.
# Molecules are assembled from raw reads using only positional overlap.
#
# Without UMIs, duplicate molecules cannot be collapsed reliably. Sensitivity
# at low VAF is limited by sequencing error rather than molecule count.
# This mode is suitable for high-depth amplicon panels where the goal is
# k-mer based variant detection without UMI infrastructure.
#
# Usage:
#   kam run --config examples/no-umi.toml \
#           --r1 sample_R1.fq.gz \
#           --r2 sample_R2.fq.gz \
#           --targets panel.fa \
#           --output-dir results/

[input]
r1      = "sample_R1.fq.gz"
r2      = "sample_R2.fq.gz"
targets = "panel.fa"

[output]
output_dir    = "results/"
output_format = "tsv,vcf"

[chemistry]
# No UMI — set both lengths to zero.
umi_length  = 0
skip_length = 0
duplex      = false
# UMI quality filter disabled when umi_length = 0.
min_umi_quality = 0

[assembly]
min_family_size = 1

[indexing]
kmer_size = 31

[calling]
min_confidence        = 0.99
strand_bias_threshold = 0.01
min_alt_molecules     = 3
# No duplex possible without UMI-based molecule tracking.
min_alt_duplex        = 0

sv_min_confidence        = 0.95
sv_min_alt_molecules     = 2
sv_strand_bias_threshold = 1.0

ti_position_tolerance = 0

[logging]
log_dir = "results/logs/"
